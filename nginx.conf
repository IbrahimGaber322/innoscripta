server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets never change; cache them aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback so deep links like /for-you resolve to the app.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
