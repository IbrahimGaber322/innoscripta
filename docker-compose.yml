# Compose reads API keys from a .env file in this directory (see .env.example).
services:
  web:
    build:
      context: .
      args:
        VITE_NEWSAPI_API_KEY: ${VITE_NEWSAPI_API_KEY:-}
        VITE_GUARDIAN_API_KEY: ${VITE_GUARDIAN_API_KEY:-}
        VITE_NYT_API_KEY: ${VITE_NYT_API_KEY:-}
        VITE_NEWSDATA_API_KEY: ${VITE_NEWSDATA_API_KEY:-}
    image: newshub
    container_name: newshub
    ports:
      - '8080:80'
    restart: unless-stopped
